<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420"
     font-family="'SF Mono', Menlo, Monaco, 'Courier New', monospace">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Window -->
  <rect x="30" y="20" width="640" height="364" rx="12" fill="#1e1e2e" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="30" y="20" width="640" height="36" rx="12" fill="#302d41"/>
  <rect x="30" y="44" width="640" height="12" fill="#302d41"/>

  <!-- Traffic lights -->
  <circle cx="58" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="78" cy="38" r="6" fill="#febc2e"/>
  <circle cx="98" cy="38" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="350" y="44" text-anchor="middle" font-size="12" fill="#6e6a86">claude — Terminal</text>

  <!-- ── REPL prompt + pasted text ── -->
  <text y="90" font-size="13">
    <tspan x="54" fill="#89b4fa" font-weight="700">❯</tspan>
    <tspan fill="#cdd6f4">  You are guiding me through setting up a personal</tspan>
  </text>
  <text x="76" y="112" font-size="13" fill="#cdd6f4">  AI chief-of-staff stack on my Mac. This is adapted</text>
  <text x="76" y="134" font-size="13" fill="#cdd6f4">  from H's setup. Be my hands: read files, run shell</text>
  <text x="76" y="156" font-size="13" fill="#cdd6f4">  commands (ask permission first), verify each step,</text>
  <text x="76" y="178" font-size="13" fill="#cdd6f4">  and wait for me between milestones.</text>

  <!-- blank line -->

  <text x="76" y="222" font-size="13" fill="#cdd6f4">  My context:</text>
  <text y="244" font-size="13">
    <tspan x="76" fill="#6e6a86">  ·  </tspan>
    <tspan fill="#cdd6f4">Mac on Apple Silicon (M1 / M2 / M3)</tspan>
  </text>
  <text y="266" font-size="13">
    <tspan x="76" fill="#6e6a86">  ·  </tspan>
    <tspan fill="#cdd6f4">Personal Claude account — not team or enterprise</tspan>
  </text>
  <text y="288" font-size="13">
    <tspan x="76" fill="#6e6a86">  ·  </tspan>
    <tspan fill="#cdd6f4">~/matt-stack/ cloned and ready</tspan>
  </text>
  <text y="310" font-size="13">
    <tspan x="76" fill="#6e6a86">  ·  </tspan>
    <tspan fill="#cdd6f4">My name is </tspan>
    <tspan fill="#fab387">[your name]</tspan>
  </text>

  <!-- blank line -->

  <!-- cursor line -->
  <rect x="76" y="328" width="9" height="17" rx="1" fill="#89b4fa" opacity="0.9"/>

  <!-- annotation: paste here -->
  <text x="658" y="90" text-anchor="end" font-size="11"
        fill="#89b4fa" opacity="0.7" font-family="-apple-system, system-ui, sans-serif">
    ← paste begins here (after ❯)
  </text>

  <!-- annotation: placeholder -->
  <text x="658" y="310" text-anchor="end" font-size="11"
        fill="#fab387" opacity="0.8" font-family="-apple-system, system-ui, sans-serif">
    ← replace with your details
  </text>

  <!-- annotation: press enter -->
  <text x="658" y="338" text-anchor="end" font-size="11"
        fill="#4a4465" font-family="-apple-system, system-ui, sans-serif">
    ← press ↵ to submit
  </text>

  <!-- bottom rule + caption -->
  <line x1="30" y1="384" x2="670" y2="384" stroke="#302d41" stroke-width="1"/>
  <text x="350" y="406" text-anchor="middle" font-size="11"
        fill="#6e6a86" font-family="-apple-system, system-ui, sans-serif">
    Step 2 — Open SETUP-PROMPT.md · copy the prompt · paste at  ❯  · press ↵
  </text>
</svg>
