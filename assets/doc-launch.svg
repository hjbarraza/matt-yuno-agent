<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300"
     font-family="'SF Mono', Menlo, Monaco, 'Courier New', monospace">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Window -->
  <rect x="30" y="20" width="640" height="244" rx="12" fill="#1e1e2e" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="30" y="20" width="640" height="36" rx="12" fill="#302d41"/>
  <rect x="30" y="44" width="640" height="12" fill="#302d41"/>

  <!-- Traffic lights -->
  <circle cx="58" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="78" cy="38" r="6" fill="#febc2e"/>
  <circle cx="98" cy="38" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="350" y="44" text-anchor="middle" font-size="12" fill="#6e6a86">Terminal — zsh</text>

  <!-- ── Line 1: shell prompt ── -->
  <text y="92" font-size="13">
    <tspan x="54" fill="#6e6a86">h@mac</tspan>
    <tspan fill="#6e6a86"> ~ </tspan>
    <tspan fill="#a6e3a1" font-weight="700">%</tspan>
    <tspan fill="#cdd6f4">  claude</tspan>
  </text>
  <!-- annotation right -->
  <text x="658" y="92" text-anchor="end" font-size="11"
        fill="#4a4465" font-family="-apple-system, system-ui, sans-serif">
    ← open Terminal.app, type this, press ↵
  </text>

  <!-- ── Claude Code startup banner ── -->
  <rect x="54" y="108" width="510" height="62" rx="7"
        fill="#2a2a3e" stroke="#45475a" stroke-width="1"/>
  <text y="128" font-size="13">
    <tspan x="72" fill="#f4dbd6">✻</tspan>
    <tspan fill="#cdd6f4" font-weight="600"> Claude Code</tspan>
    <tspan fill="#6e6a86">  ·  claude-sonnet-4-6</tspan>
  </text>
  <text x="72" y="153" font-size="11.5" fill="#6e6a86">
    /help for commands  ·  ? for shortcuts  ·  esc to interrupt
  </text>

  <!-- ── Claude REPL prompt ── -->
  <text y="196" font-size="13">
    <tspan x="54" fill="#89b4fa" font-weight="700">❯</tspan>
  </text>
  <!-- blinking cursor block -->
  <rect x="72" y="181" width="9" height="17" rx="1" fill="#89b4fa" opacity="0.9"/>
  <!-- annotation right -->
  <text x="658" y="196" text-anchor="end" font-size="11"
        fill="#89b4fa" opacity="0.7" font-family="-apple-system, system-ui, sans-serif">
    ← Claude REPL — paste your setup prompt here, press ↵
  </text>

  <!-- bottom rule + caption -->
  <line x1="30" y1="264" x2="670" y2="264" stroke="#302d41" stroke-width="1"/>
  <text x="350" y="285" text-anchor="middle" font-size="11"
        fill="#6e6a86" font-family="-apple-system, system-ui, sans-serif">
    Step 1 — Open Terminal.app · run  claude · wait for the  ❯  prompt
  </text>
</svg>
